<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <linearGradient id="g-browser" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="g-api" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="g-svc" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="g-db" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
  </defs>

  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">xml2emmet — Layered Architecture</text>

  <!-- Browser layer -->
  <rect x="40" y="60" width="840" height="120" rx="10" fill="url(#g-browser)" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="60" y="84" font-weight="700" fill="#0f172a">Browser  ·  vanilla JS, single HTML page</text>
  <rect x="60"  y="100" width="180" height="60" rx="6" fill="#fff" stroke="#1d4ed8"/>
  <text x="150" y="125" text-anchor="middle">Login / Register</text>
  <text x="150" y="143" text-anchor="middle" font-size="11" fill="#475569">auth.js</text>

  <rect x="260" y="100" width="180" height="60" rx="6" fill="#fff" stroke="#1d4ed8"/>
  <text x="350" y="125" text-anchor="middle">Transform panel</text>
  <text x="350" y="143" text-anchor="middle" font-size="11" fill="#475569">transform.js · tree view</text>

  <rect x="460" y="100" width="180" height="60" rx="6" fill="#fff" stroke="#1d4ed8"/>
  <text x="550" y="125" text-anchor="middle">Rules / History</text>
  <text x="550" y="143" text-anchor="middle" font-size="11" fill="#475569">rules.js · history.js</text>

  <rect x="660" y="100" width="200" height="60" rx="6" fill="#fff" stroke="#1d4ed8"/>
  <text x="760" y="125" text-anchor="middle">Stats dashboard</text>
  <text x="760" y="143" text-anchor="middle" font-size="11" fill="#475569">stats.js</text>

  <!-- arrow browser → api -->
  <line x1="460" y1="180" x2="460" y2="220" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="475" y="205" font-size="11" fill="#475569">JSON over fetch  ·  session cookie</text>

  <!-- API layer -->
  <rect x="40" y="220" width="840" height="110" rx="10" fill="url(#g-api)" stroke="#b45309" stroke-width="1.5"/>
  <text x="60" y="244" font-weight="700" fill="#0f172a">PHP API  ·  one front controller (index.php)  ·  Router  ·  Auth gate</text>
  <rect x="60"  y="260" width="155" height="50" rx="6" fill="#fff" stroke="#b45309"/>
  <text x="137" y="282" text-anchor="middle">/api/auth/*</text>
  <text x="137" y="299" text-anchor="middle" font-size="11" fill="#475569">register · login · me</text>

  <rect x="230" y="260" width="155" height="50" rx="6" fill="#fff" stroke="#b45309"/>
  <text x="307" y="282" text-anchor="middle">/api/transform</text>
  <text x="307" y="299" text-anchor="middle" font-size="11" fill="#475569">xml↔emmet</text>

  <rect x="400" y="260" width="155" height="50" rx="6" fill="#fff" stroke="#b45309"/>
  <text x="477" y="282" text-anchor="middle">/api/rules</text>
  <text x="477" y="299" text-anchor="middle" font-size="11" fill="#475569">CRUD</text>

  <rect x="570" y="260" width="155" height="50" rx="6" fill="#fff" stroke="#b45309"/>
  <text x="647" y="282" text-anchor="middle">/api/history</text>
  <text x="647" y="299" text-anchor="middle" font-size="11" fill="#475569">list · get · restore</text>

  <rect x="740" y="260" width="120" height="50" rx="6" fill="#fff" stroke="#b45309"/>
  <text x="800" y="282" text-anchor="middle">/api/stats</text>
  <text x="800" y="299" text-anchor="middle" font-size="11" fill="#475569">on demand</text>

  <line x1="460" y1="330" x2="460" y2="370" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Services layer -->
  <rect x="40" y="370" width="840" height="130" rx="10" fill="url(#g-svc)" stroke="#15803d" stroke-width="1.5"/>
  <text x="60" y="394" font-weight="700" fill="#0f172a">Services  ·  PHP modules</text>

  <rect x="60"  y="410" width="170" height="80" rx="6" fill="#fff" stroke="#15803d"/>
  <text x="145" y="432" text-anchor="middle" font-weight="600">Auth</text>
  <text x="145" y="452" text-anchor="middle" font-size="11" fill="#475569">password_hash</text>
  <text x="145" y="468" text-anchor="middle" font-size="11" fill="#475569">PHP sessions</text>

  <rect x="245" y="410" width="240" height="80" rx="6" fill="#fff" stroke="#15803d"/>
  <text x="365" y="432" text-anchor="middle" font-weight="600">TransformEngine  ·  algorithmic core</text>
  <text x="365" y="452" text-anchor="middle" font-size="11" fill="#475569">xmlParse · emmetParse</text>
  <text x="365" y="468" text-anchor="middle" font-size="11" fill="#475569">emmetEmit · xmlEmit · applyRules</text>

  <rect x="500" y="410" width="170" height="80" rx="6" fill="#fff" stroke="#15803d"/>
  <text x="585" y="432" text-anchor="middle" font-weight="600">History</text>
  <text x="585" y="452" text-anchor="middle" font-size="11" fill="#475569">save · list</text>
  <text x="585" y="468" text-anchor="middle" font-size="11" fill="#475569">restore data/settings</text>

  <rect x="685" y="410" width="175" height="80" rx="6" fill="#fff" stroke="#15803d"/>
  <text x="772" y="432" text-anchor="middle" font-weight="600">Stats</text>
  <text x="772" y="452" text-anchor="middle" font-size="11" fill="#475569">tree walk · CSS tokenize</text>
  <text x="772" y="468" text-anchor="middle" font-size="11" fill="#475569">top-N classes · depth</text>

  <line x1="460" y1="500" x2="460" y2="540" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="475" y="525" font-size="11" fill="#475569">PDO</text>

  <!-- DB layer -->
  <rect x="40" y="540" width="840" height="90" rx="10" fill="url(#g-db)" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="60" y="564" font-weight="700" fill="#0f172a">MySQL  ·  RDS db.t4g.micro</text>
  <rect x="60"  y="578" width="180" height="40" rx="6" fill="#fff" stroke="#b91c1c"/>
  <text x="150" y="603" text-anchor="middle">users</text>
  <rect x="260" y="578" width="220" height="40" rx="6" fill="#fff" stroke="#b91c1c"/>
  <text x="370" y="603" text-anchor="middle">transformations (history)</text>
  <rect x="500" y="578" width="180" height="40" rx="6" fill="#fff" stroke="#b91c1c"/>
  <text x="590" y="603" text-anchor="middle">rules</text>
  <rect x="700" y="578" width="160" height="40" rx="6" fill="#fff" stroke="#b91c1c"/>
  <text x="780" y="603" text-anchor="middle">sessions (DB-backed)</text>
</svg>
